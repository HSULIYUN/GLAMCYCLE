<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>捐款管理系統</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <style>
        body {
            padding-top: 20px;
        }
        .container {
            max-width: 1200px;
        }
        .header {
            padding-bottom: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #e5e5e5;
        }
        .edit, .delete {
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header clearfix">
        <h3 class="text-muted">捐款管理系統</h3>
    </div>
    <div class="table-responsive">
        <table class="table table-striped">
            <thead>
            <tr>
                <th>id</th>
                <th>姓名</th>
                <th>身分證字號</th>
                <th>捐款金額</th>
                <th>電子郵件</th>
                <th>信用卡帳號</th>
                <th>信用卡到期日</th>
                <th>信用卡安全碼</th>
                <th>備註</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody id="donation-list">
            <!-- 捐款人資料將通過後端腳本動態載入到這裡 -->
            </tbody>
        </table>
    </div>
</div>

<!-- 模態彈窗 -->
<form id="edit-form" class="form">
<div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="editModalLabel">編輯捐款資訊</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <!-- 編輯表單 -->
            
            <div class="form-group">
                <input type="hidden" id="id" name="id" required>
            </div>
            <div class="form-group">
                <label for="name">姓名:</label>
                <input class="form-control" type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="pas">身分證字號:</label>
                <input class="form-control" type="password" id="pas" name="pas" required>
            </div>
            <div class="form-group">
                <label for="mon">捐款金額:</label>
                <input class="form-control" type="number" id="mon" name="mon" required>
            </div>
            <div class="form-group">
                <label for="email">電子郵件:</label>
                <input class="form-control" type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="eee">信用卡帳號:</label>
                <input class="form-control" type="text" id="eee" name="eee" required>
            </div>
            <div class="form-group">
                <label for="eeee">信用卡到期日:</label>
                <input class="form-control" type="text" id="eeee" name="eeee" required>
            </div>
            <div class="form-group">
                <label for="safe">信用卡安全碼:</label>
                <input class="form-control" type="password" id="safe" name="safe" required>
            </div>
            <div class="form-group">
                <label for="place">備註:</label>
                <textarea class="form-control" id="place" name="place" rows="5" required></textarea>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">關閉</button>
          <button type="button" class="btn btn-primary" id="save-edit">保存更改</button>
        </div>
      </div>
    </div>
  </div>
</form>

  

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
<script>
$(document).ready(function() {
    // Fetch initial donation data
    fetchDonations();

    // Event handler for the save button
    $('#save-edit').click(function() {
    var formData = $('#edit-form').serialize(); // Serialize the form data

    $.ajax({
        type: "POST",
        url: "update_donation.php",
        data: formData,
        success: function(response) {
            var jsonData = JSON.parse(response);
            if (jsonData.status === "success") {
                $('#editModal').modal('hide');
                fetchDonations(); // Refresh the data on the page
                alert("成功更新");
            } else {
                alert("更新錯誤：" + jsonData.message);
            }
        },
        error: function(xhr, status, error) {
            alert("發生錯誤：" + error);
        }
    });
});

});

// Function to fetch donations and refresh the table
function fetchDonations() {
    $.ajax({
        url: 'fetch_donations.php',
        type: 'GET',
        success: function(data) {
            $('#donation-list').html(data);
            // Bind click events to the edit buttons after data is loaded
            $('.edit-btn').click(function() {
                var donorId = $(this).data('id');
                // You would need to fill the form with data related to donorId
                $('#editModal').modal('show');
            });
        },
        error: function() {
            alert("Unable to load donation data.");
        }
    });
}
</script>

</body>
</html>
