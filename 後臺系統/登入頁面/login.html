<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8" />
    <link href="login.css" rel="stylesheet" />
    <title>後臺管理 | GLAMCYCLE</title>
    <link rel="icon" type="image/png" href="pic/GClogo.png">
</head>
<body>
<div class="login-box">
    <h2>GLAMCYCLE | 管理員頁面</h2>
    <form action="login.php" method="POST">
      <div class="user-box">
        <input type="text" name="username" required>
        <label>使用者名稱</label>
      </div>
      <div class="user-box">
        <input type="password" name="password" required>
        <label>密碼</label>
      </div>
      <button type="submit">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          登入
      </button>
    </form>
    <script>
      window.onload = function() {
          const params = new URLSearchParams(window.location.search);
          const error = params.get('error');
          if (error) {
              let message = '';
              if (error === 'missing') {
                  message = '用戶名或密碼未提供！';
              } else if (error === 'invalid') {
                  message = '登入失敗: 使用者名稱或密碼錯誤';
              }
              alert(message);
          }
      };
      </script>
      
  </div>

  <!-- google安全機器人 -->
<script src="https://www.google.com/recaptcha/api.js?render=6Lew6pMpAAAAACtHg6401eggdpStQxrvAP8T1SPu"></script>
<script>
    grecaptcha.ready(function() {
        grecaptcha.execute('6Lew6pMpAAAAACtHg6401eggdpStQxrvAP8T1SPu', {action: 'submit'}).then(function(token) {
            document.getElementById('recaptchaResponse').value = token;
        });
    });
</script>
</body>
</html>
